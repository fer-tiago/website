media:
  input: assets/images
  output: /assets/images

content:
  - name: posts
    label: Blog Posts
    type: collection
    path: _posts
    format: frontmatter
    filename: "{year}-{month}-{day}-{slug}"
    list:
      - title
      - cover_image
    fields:
      - name: title
        label: Title
        type: string
      - name: cover_image
        label: Cover Image
        type: image
      - name: body
        label: Content
        type: rich-text
media:
  input: assets/images
  output: /assets/images

content:
  - name: posts
    label: Visual Archive
    type: collection
    path: _posts
    filename: "{year}-{month}-{day}-{slug}.md"

    fields:
      - name: title
        label: Title
        type: string
        required: true

      - name: date
        label: Date
        type: date
        required: true

      - name: tags
        label: Tags
        type: string
        list: true

      - name: cover_image
        label: Cover Image URL
        type: string
        required: true

      - name: body
        label: Content
        type: rich-text

  - name: slices
    label: Text Slices
    type: collection
    path: _slices

    fields:
      - name: top_text
        label: Top Text
        type: string
    
      - name: top_link
        label: Top Link
        type: string
        required: false
    
      - name: middle_text
        label: Middle Text
        type: string
    
      - name: middle_link
        label: Middle Link
        type: string
        required: false
    
      - name: bottom_text
        label: Bottom Text
        type: string
    
      - name: bottom_link
        label: Bottom Link
        type: string
        required: false
    
      - name: side
        label: Side
        type: string
        default: right

  - name: music
    label: Music
    type: collection
    path: _music

    fields:
      - name: title
        label: Track Title
        type: string

      - name: artist
        label: Artist
        type: string

      - name: file
        label: MP3 File
        type: string

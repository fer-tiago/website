---
layout: default
title: "Visual Archive"
---

<style>
body {
    background: #111;
    color: white;
}
</style>

<div class="gallery-grid">
    {% for post in site.posts %}
        <a href="{{ post.url | relative_url }}">
            <img src="{{ post.cover_image | relative_url }}" alt="{{ post.title }}">
        </a>
    {% endfor %}
</div>

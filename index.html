---
layout: default
title: "Visual Archive"
---
<link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">

<style>
body {
    margin: 0;
    overflow-y: hidden;
}
</style>

<div id="intro-overlay">
    <div id="intro-message">
        CLICK TO ENTER
    </div>
</div>

<div class="gallery-grid" id="gallery">

{% assign posts = site.posts | sort: "date" | reverse %}

{% for post in posts %}
    <a
        class="image-slice"
        href="{{ post.url | relative_url }}"
        data-tags="{{ post.tags | join: ',' }}"
    >
        <img
            src="{{ post.cover_image | relative_url }}"
            alt="{{ post.title }}"
        >
    </a>
{% endfor %}

</div>

<script>

// ----------------------------------------
// MUSIC
// ----------------------------------------

const tracks = [

{% for track in site.music %}
{
    title: {{ track.title | jsonify }},
    artist: {{ track.artist | jsonify }},
    file: {{ track.file | relative_url | jsonify }}
},
{% endfor %}

];

let player;
let currentTrack;

if (window.archivePlayer) {

    player =
        window.archivePlayer;

    currentTrack =
        window.archiveTrack;

} else {

    currentTrack =
        tracks[
            Math.floor(
                Math.random() *
                tracks.length
            )
        ];

    player =
        new Audio(
            currentTrack.file
        );

    player.loop = true;

    window.archivePlayer =
        player;

    window.archiveTrack =
        currentTrack;

}

// ----------------------------------------
// TAG FILTERING
// ----------------------------------------

let activeTag =
    new URLSearchParams(window.location.search)
        .get('tag') || 'design';

function applyTag(tag) {

    activeTag = tag;

    document
        .querySelectorAll('.image-slice')
        .forEach(post => {

            const tags = (post.dataset.tags || '')
                .split(',')
                .map(t => t.trim().toLowerCase());

            post.style.display =
                tags.includes(tag.toLowerCase())
                    ? ''
                    : 'none';

        });

}

applyTag(activeTag);

// ----------------------------------------
// INTERCEPT TAG LINKS
// ----------------------------------------

document.addEventListener('click', event => {

    const link =
        event.target.closest('a');

    if (!link) return;

    const href =
        link.getAttribute('href');

    if (!href) return;

    if (!href.startsWith('?tag=')) return;

    event.preventDefault();

    const tag =
        href.replace('?tag=', '');

    history.pushState(
        {},
        '',
        '?tag=' + tag
    );

    applyTag(tag);

});

window.addEventListener('popstate', () => {

    const tag =
        new URLSearchParams(window.location.search)
            .get('tag') || 'design';

    applyTag(tag);

});
// ----------------------------------------
// TEXT SLICES DATA
// ----------------------------------------

const textSlices = [

    {
        topText: 'Now Playing',
        topLink: '',

        middleText: currentTrack.title,
        middleLink: '',

        bottomText: currentTrack.artist,
        bottomLink: '',

        side: 'left'
    },

    {% for slice in site.slices %}
    {
        topText: {{ slice.top_text | default: "" | jsonify }},
        topLink: {{ slice.top_link | default: "" | jsonify }},

        middleText: {{ slice.middle_text | default: "" | jsonify }},
        middleLink: {{ slice.middle_link | default: "" | jsonify }},

        bottomText: {{ slice.bottom_text | default: "" | jsonify }},
        bottomLink: {{ slice.bottom_link | default: "" | jsonify }},

        side: {{ slice.side | default: "right" | jsonify }}
    },
    {% endfor %}

];    
// ----------------------------------------
// TEXT SLICE HELPERS
// ----------------------------------------

const gallery =
    document.getElementById('gallery');

const occupiedPositions =
    new Set();

function createSection(text, link = '') {

    if (!text) return '';

    return `
        <div class="text-slice-section">
            ${
                link
                    ? `<a href="${link}" class="text-slice-link">${text}</a>`
                    : text
            }
        </div>
    `;
}

function createTextSlice(data) {

    const element =
        document.createElement('div');

    element.className =
        `text-slice ${data.side || 'right'}`;

    element.innerHTML =
        createSection(data.topText, data.topLink) +
        createSection(data.middleText, data.middleLink) +
        createSection(data.bottomText, data.bottomLink);

    return element;
}

function randomPosition() {

    const max =
        Math.min(14, gallery.children.length);

    let position;

    do {

        position =
            Math.floor(Math.random() * max) + 1;

    } while (
        occupiedPositions.has(position) &&
        occupiedPositions.size < max
    );

    occupiedPositions.add(position);

    return position;
}

function insertSlice(element) {

    const position =
        randomPosition();

    if (gallery.children[position]) {

        gallery.insertBefore(
            element,
            gallery.children[position]
        );

    } else {

        gallery.appendChild(element);

    }

}

// ----------------------------------------
// BUILD SLICES
// ----------------------------------------

textSlices
    .map(createTextSlice)
    .forEach(insertSlice);

// ----------------------------------------
// INTRO OVERLAY
// ----------------------------------------

const overlay =
    document.getElementById('intro-overlay');

const hasEntered =
    sessionStorage.getItem('archiveEntered');

async function startMusic() {

    try {
        await player.play();
    } catch (err) {
        console.log(err);
    }

}

async function enterArchive() {

    sessionStorage.setItem(
        'archiveEntered',
        'true'
    );

    await startMusic();

    overlay.classList.add('hidden');

    setTimeout(() => {

        overlay.remove();

    }, 1200);

}

if (hasEntered) {

    overlay.remove();

    startMusic();

} else {

    overlay.addEventListener(
        'click',
        enterArchive
    );

}

// Browser back button / page cache
window.addEventListener('pageshow', () => {

    if (
        sessionStorage.getItem('archiveEntered')
    ) {

        if (overlay) {
            overlay.remove();
        }

        startMusic();

    }

});

</script>

---
layout: default
title: "Visual Archive"
---
<link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
<style> 
    body { margin: 0; overflow-y: hidden; } 
</style>

<div class="gallery-grid" id="gallery">

    {% assign posts = site.posts | sort: "date" | reverse %}

    {% for post in posts %}
        <a
            class="image-slice"
            href="{{ post.url | relative_url }}"
        >
            <img
                src="{{ post.cover_image | relative_url }}"
                alt="{{ post.title }}"
            >
        </a>
    {% endfor %}

</div>

<script>
const textSlices = [
{% for slice in site.slices %}
{
    text: {{ slice.text | jsonify }},
    link: {{ slice.link | default: "" | jsonify }},
    side: {{ slice.side | default: "right" | jsonify }}
},
{% endfor %}
];

const gallery = document.getElementById('gallery');
const usedPositions = new Set();

textSlices.forEach(item => {

    const element = document.createElement('div');
    element.className = 'text-slice';
    element.classList.add(item.side || 'right');

    if (item.link && item.link.trim() !== '') {
        element.innerHTML =
            `<a href="${item.link}" class="text-slice-link">${item.text}</a>`;
    } else {
        element.textContent = item.text;
    }

    // Allowed positions: 1–14
    // Never the first column (0)
    const maxPosition = Math.min(14, gallery.children.length);

    let position;

    do {
        position = Math.floor(Math.random() * maxPosition) + 1;
    } while (
        usedPositions.has(position) &&
        usedPositions.size < maxPosition
    );

    usedPositions.add(position);

    if (gallery.children[position]) {
        gallery.insertBefore(
            element,
            gallery.children[position]
        );
    } else {
        gallery.appendChild(element);
    }
});
</script>

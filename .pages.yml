media:
  input: assets/images
  output: /assets/images

content:
  - name: posts
    label: Blog Posts
    type: collection
    path: _posts
    format: frontmatter
    filename: "{year}-{month}-{day}-{slug}.md"
    list:
      - title
      - cover_image
    fields:
      - name: title
        label: Title
        type: string
        required: true
      - name: cover_image
        label: Cover Image
        type: image
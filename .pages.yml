media:
  input: assets/images
  output: /assets/images

content:
  - name: posts
    label: Visual Archive
    type: collection
    path: _posts
    filename: "{year}-{month}-{day}-{slug}.md"

    fields:
      - name: title
        label: Title
        type: string
        required: true

      - name: date
        label: Date
        type: date
        required: true

      - name: tags
        label: Tags
        type: string
        list: true

      - name: cover_image
        label: Cover Image
        type: image
        required: true

      - name: body
        label: Content
        type: rich-text
<link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">

<style>
body {
    margin: 0;
    overflow-y: hidden;
    overflow-x: auto;
}
</style>

<div 
    id="error-404">
    
    <div id="message-404">
        404
    </div>
    <button
    class="back-button"
    onclick="goBack()"
>
    ← back
</button>

    
    <script>
function goBack() {

    if (history.length > 1) {

        history.back();

    } else {

        window.location.href =
            '{{ "/" | relative_url }}';

    }

}
</script>
    
</div>

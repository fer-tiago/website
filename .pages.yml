media:
  input: assets/images
  output: /assets/images

content:
  - name: posts
    label: Blog Posts
    type: collection
    path: _posts
    format: frontmatter
    # Simplified filename template
    filename: "{slug}" 
    # Explicitly define the extension
    extension: md
    list:
      - title
      - cover_image
    fields:
      - name: title
        label: Title
        type: string
        required: true
      - name: cover_image
        label: Cover Image
        type: image
      - name: body
        label: Content
        type: rich-text